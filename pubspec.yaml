name: yezdiadv
description: Yezdi Adventure Bluetooth Navigation App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter

  # Bluetooth BLE
  flutter_blue_plus: ^2.3.1

  # Google Maps & navigation
  google_maps_flutter: ^2.17.0
  flutter_polyline_points: ^3.1.0

  # Location / GPS
  geolocator: ^14.0.2

  # Permissions
  permission_handler: ^12.0.1

  # HTTP (Google Directions / Places)
  http: ^1.6.0

  # State management
  provider: ^6.1.5+1

  # Local persistence & media
  shared_preferences: ^2.5.3
  image_picker: ^1.2.1

  # Dashboard, background, notifications, and device status
  flutter_animate: ^4.5.2
  flutter_background_service: ^5.1.0
  notification_listener_service: ^0.3.5
  telephony: ^0.2.0
  connectivity_plus: ^7.1.1
  battery_plus: ^7.0.0
  flutter_compass: ^0.8.1

  # Icons (arrow assets)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
