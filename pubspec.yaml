name: yezdiadv
description: Yezdi Adventure Bluetooth Navigation App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.32.0'

dependencies:
  flutter:
    sdk: flutter

  # Bluetooth BLE
  flutter_blue_plus: ^1.36.8

  # Google Maps & navigation
  google_maps_flutter: ^2.14.2
  flutter_polyline_points: ^2.1.0

  # Location / GPS
  geolocator: ^11.1.0

  # Permissions
  permission_handler: ^11.4.0

  # HTTP (Google Directions / Places)
  http: ^1.6.0

  # State management
  provider: ^6.1.5

  # Local persistence & media
  shared_preferences: ^2.5.3
  image_picker: ^1.2.1

  # Dashboard, background, notifications, and device status
  flutter_animate: ^4.5.2
  flutter_background_service: ^5.1.0
  notification_listener_service: ^0.3.5
  telephony: ^0.2.0
  connectivity_plus: ^6.1.4
  battery_plus: ^6.2.3
  flutter_compass: ^0.8.1

  # Icons (arrow assets)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
